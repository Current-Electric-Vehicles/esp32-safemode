name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: firmware/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: firmware/frontend

      - name: Build frontend
        run: npm run build
        working-directory: firmware/frontend

      - name: Set version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(date -u +%Y%m%d%H%M%S)
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32
          path: firmware
          command: |
            python ../scripts/build_frontend.py
            idf.py -B build build
            cp build/safemode.bin ../safemode-${VERSION}.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Safemode ${{ env.VERSION }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', env.VERSION) }}
          generate_release_notes: true
          files: safemode-*.bin
